{% extends "base.html" %}

{% block content %}
<div class="form-container card mx-auto">
    <div class="form-header">
        <h2>{% if record %}編輯紀錄{% else %}新增一筆紀錄{% endif %}</h2>
    </div>
    
    <form method="POST" class="record-form">
        <div class="form-group row">
            <div class="col-half">
                <label>收支屬性 <span class="required">*</span></label>
                <div class="type-selectors">
                    <label class="radio-card income">
                        <input type="radio" name="type" value="income" required {% if record and record.type == 'income' %}checked{% endif %}>
                        <span class="radio-btn"><i class="fa-solid fa-plus"></i> 收入</span>
                    </label>
                    <label class="radio-card expense">
                        <input type="radio" name="type" value="expense" required {% if not record or record.type == 'expense' %}checked{% endif %}>
                        <span class="radio-btn"><i class="fa-solid fa-minus"></i> 支出</span>
                    </label>
                </div>
            </div>
            <div class="col-half">
                <label for="date">紀錄日期 <span class="required">*</span></label>
                <input type="date" id="date" name="date" class="form-control" 
                       value="{{ record.date if record else '' }}" required>
            </div>
        </div>

        <div class="form-group row">
            <div class="col-half">
                <label for="category">消費或收入類別 <span class="required">*</span></label>
                <select id="category" name="category" class="form-control" required>
                    <option value="" disabled selected>請選擇...</option>
                    <optgroup label="支出項目">
                        <option value="食" {% if record and record.category == '食' %}selected{% endif %}>🍔 飲食餐飲</option>
                        <option value="衣" {% if record and record.category == '衣' %}selected{% endif %}>👕 衣服購物</option>
                        <option value="住" {% if record and record.category == '住' %}selected{% endif %}>🏠 房租水電</option>
                        <option value="行" {% if record and record.category == '行' %}selected{% endif %}>🚗 交通通勤</option>
                        <option value="育" {% if record and record.category == '育' %}selected{% endif %}>📚 教育學習</option>
                        <option value="樂" {% if record and record.category == '樂' %}selected{% endif %}>🎮 娛樂消遣</option>
                        <option value="其他支出" {% if record and record.category == '其他支出' %}selected{% endif %}>💸 其他支出</option>
                    </optgroup>
                    <optgroup label="收入項目">
                        <option value="薪資" {% if record and record.category == '薪資' %}selected{% endif %}>💰 每月薪水</option>
                        <option value="獎金" {% if record and record.category == '獎金' %}selected{% endif %}>🎁 業績獎金</option>
                        <option value="投資" {% if record and record.category == '投資' %}selected{% endif %}>📈 投資獲利</option>
                        <option value="其他收入" {% if record and record.category == '其他收入' %}selected{% endif %}>💵 其他獲得</option>
                    </optgroup>
                </select>
            </div>
            <div class="col-half">
                <label for="amount">總金額 <span class="required">*</span></label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" id="amount" name="amount" class="form-control" 
                           value="{{ record.amount if record else '' }}" step="0.01" min="0" required placeholder="例如：1500">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="description">備註細節描述</label>
            <input type="text" id="description" name="description" class="form-control" 
                   value="{{ record.description if record else '' }}" placeholder="輸入這筆帳目的相關備註... (選填項目)">
        </div>

        <div class="form-actions">
            <a href="{{ url_for('routes.index') }}" class="btn btn-secondary">取消放棄</a>
            <button type="submit" class="btn btn-primary">
                {% if record %}儲存變更{% else %}<i class="fa-solid fa-check"></i> 新增紀錄{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
    // 在「新增紀錄」時，預設填入今天的日期
    const dateInput = document.getElementById('date');
    if (!dateInput.value) {
        // 設定瀏覽器時區的今天
        const today = new Date().toLocaleDateString('en-CA'); // format: YYYY-MM-DD
        dateInput.value = today;
    }
</script>
{% endblock %}
